apiVersion: apps/v1
kind: Deployment
metadata:
  name: stack-auth-clickhouse
  namespace: six-degrees-apps
  labels:
    app: stack-auth-clickhouse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stack-auth-clickhouse
  template:
    metadata:
      labels:
        app: stack-auth-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:25.10
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          envFrom:
            - secretRef:
                name: stack-auth-clickhouse-secret
          env:
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stack-auth-clickhouse
  namespace: six-degrees-apps
spec:
  selector:
    app: stack-auth-clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
