apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stack-auth-secret
  namespace: six-degrees-apps
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: stack-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: STACK_DATABASE_CONNECTION_STRING
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_DATABASE_CONNECTION_STRING
    - secretKey: STACK_DIRECT_DATABASE_CONNECTION_STRING
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_DIRECT_DATABASE_CONNECTION_STRING
    - secretKey: STACK_SERVER_SECRET
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_SERVER_SECRET
    - secretKey: NEXT_PUBLIC_STACK_PROJECT_ID
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: NEXT_PUBLIC_STACK_PROJECT_ID
    - secretKey: NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY
    - secretKey: STACK_SECRET_SERVER_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_SECRET_SERVER_KEY
    - secretKey: STACK_SEED_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_SEED_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY
    - secretKey: STACK_SEED_INTERNAL_PROJECT_SECRET_SERVER_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_SEED_INTERNAL_PROJECT_SECRET_SERVER_KEY
    - secretKey: STACK_SEED_INTERNAL_PROJECT_SUPER_SECRET_ADMIN_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_SEED_INTERNAL_PROJECT_SUPER_SECRET_ADMIN_KEY
    # Entrypoint reads these for the dashboard (not STACK_SEED_* / NEXT_PUBLIC_* alone)
    - secretKey: STACK_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_INTERNAL_PROJECT_PUBLISHABLE_CLIENT_KEY
    - secretKey: STACK_INTERNAL_PROJECT_SECRET_SERVER_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_INTERNAL_PROJECT_SECRET_SERVER_KEY
    - secretKey: STACK_FREESTYLE_API_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_FREESTYLE_API_KEY
    - secretKey: STACK_VERCEL_SANDBOX_TOKEN
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_VERCEL_SANDBOX_TOKEN
    - secretKey: STACK_VERCEL_SANDBOX_TEAM_ID
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_VERCEL_SANDBOX_TEAM_ID
    - secretKey: STACK_VERCEL_SANDBOX_PROJECT_ID
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_VERCEL_SANDBOX_PROJECT_ID
    - secretKey: STACK_EMAILABLE_API_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAILABLE_API_KEY
    - secretKey: STACK_EMAIL_HOST
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAIL_HOST
    - secretKey: STACK_EMAIL_PORT
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAIL_PORT
    - secretKey: STACK_EMAIL_USERNAME
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAIL_USERNAME
    - secretKey: STACK_EMAIL_PASSWORD
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAIL_PASSWORD
    - secretKey: STACK_EMAIL_SENDER
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_EMAIL_SENDER
    - secretKey: STACK_S3_ENDPOINT
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_ENDPOINT
    - secretKey: STACK_S3_REGION
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_REGION
    - secretKey: STACK_S3_ACCESS_KEY_ID
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_ACCESS_KEY_ID
    - secretKey: STACK_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_SECRET_ACCESS_KEY
    - secretKey: STACK_S3_BUCKET
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_BUCKET
    - secretKey: STACK_S3_PRIVATE_BUCKET
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_PRIVATE_BUCKET
    - secretKey: STACK_S3_PUBLIC_ENDPOINT
      remoteRef:
        key: six-degrees/stack-auth-test/secrets
        property: STACK_S3_PUBLIC_ENDPOINT
