apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: couchdb-auth-secret
  namespace: couchdb
  labels:
    app: couchdb
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: couchdb-auth
    creationPolicy: Owner
  data:
    - secretKey: adminUsername
      remoteRef:
        key: mfo/private/couchdb/secrets
        property: adminUsername
    - secretKey: adminPassword
      remoteRef:
        key: mfo/private/couchdb/secrets
        property: adminPassword
    - secretKey: cookieAuthSecret
      remoteRef:
        key: mfo/private/couchdb/secrets
        property: cookieAuthSecret
    - secretKey: erlangCookie
      remoteRef:
        key: mfo/private/couchdb/secrets
        property: erlangCookie

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: couchdb-basic-auth
  namespace: couchdb
  labels:
    app: couchdb
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: couchdb-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: mfo/private/couchdb/secrets
        property: basicAuth

